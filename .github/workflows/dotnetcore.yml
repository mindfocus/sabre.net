name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore peachpie-sabre/sabre.net.sln

    - name: Build
      run: dotnet build peachpie-sabre/sabre.net.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test sabre.net.tests/sabre.net.tests.csproj --configuration Release --no-build --verbosity normal

  # 仅在打 v* tag 时发布 nuget（普通 push/PR 只构建+测试）
  publish-nuget:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore peachpie-sabre/sabre.net.sln

    - name: Build (Release)
      run: dotnet build peachpie-sabre/sabre.net.sln --configuration Release --no-restore

    # 从 tag 名（v1.0.5）提取版本号（1.0.5），覆盖 csproj 的 Version，保证 nuget 包版本与 tag 一致
    - name: Set version from tag
      id: version
      shell: bash
      run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Pack
      run: dotnet pack peachpie-sabre/sabre.net.msbuildproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} -o ./nupkg

    - name: Publish to NuGet
      uses: nuget/actions/publish@v1
      with:
        nupkg-path: ./nupkg/*.nupkg
        api-key: ${{ secrets.NUGET_KEY }}
