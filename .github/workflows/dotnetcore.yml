name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Peachpie 1.1.13 工具链依赖 net6.0 runtime；项目目标为 net8.0。同时安装两者。
        dotnet-version: |
          6.0.x
          8.0.x

    - name: Restore
      run: dotnet restore sabre.net.tests/sabre.net.tests.csproj

    - name: Build
      # 构建测试项目，自动拉起依赖链（sabre.net.msbuildproj + libxml2.net + runtimepatch）。
      # 不构建整个 sln：sabre.net.bridge 含未完成的命名空间引用（Sabre.VObject.ComponentNs），
      # 会阻断构建；bridge 不在任何测试/发布依赖链上，暂不纳入 CI。
      run: dotnet build sabre.net.tests/sabre.net.tests.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test sabre.net.tests/sabre.net.tests.csproj --configuration Release --no-build --verbosity normal

  # 仅在打 v* tag 时发布 nuget（普通 push/PR 只构建+测试）
  # 使用 Trusted Publishing（OIDC），无需维护长期 API key。
  # 前提：已在 nuget.org 的 sabre.net 包配置 Trusted Publishing policy，
  # 关联本仓库（mindfocus/sabre.net）与本 workflow 文件（dotnetcore.yml）。
  # 详见 https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
  publish-nuget:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      # OIDC Trusted Publishing 必需：允许 GitHub 向 nuget.org 签发短期 token
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Peachpie 1.1.13 工具链依赖 net6.0 runtime；项目目标为 net8.0。同时安装两者。
        dotnet-version: |
          6.0.x
          8.0.x

    - name: Restore
      run: dotnet restore peachpie-sabre/sabre.net.msbuildproj

    - name: Build (Release)
      run: dotnet build peachpie-sabre/sabre.net.msbuildproj --configuration Release --no-restore

    # 从 tag 名（v1.0.5）提取版本号（1.0.5），覆盖 csproj 的 Version，保证 nuget 包版本与 tag 一致
    - name: Set version from tag
      id: version
      shell: bash
      run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Pack
      run: dotnet pack peachpie-sabre/sabre.net.msbuildproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} -o ./nupkg

    # Trusted Publishing：用 OIDC 换取 nuget.org 短期 API key（无需 NUGET_KEY secret）
    - name: Login to NuGet (Trusted Publishing / OIDC)
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Publish to NuGet
      # 用 login 步骤输出的短期 token；bash shell 正确展开 nupkg 通配符
      shell: bash
      env:
        NUGET_AUTH_TOKEN: ${{ steps.nuget-login.outputs.NUGET_AUTH_TOKEN }}
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_AUTH_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate
